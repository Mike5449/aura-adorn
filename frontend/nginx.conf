# ----------------------------------------------------------------
# Carat & Couleur — single-container frontend
#
# Serves the Vite-built SPA on / and proxies /api & /media to the
# backend service (defined in docker-compose).
# ----------------------------------------------------------------

upstream backend_api {
    server backend:8000;
    keepalive 16;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 10M;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # ------------------------------------------------------------
    # Backend pass-through
    # ------------------------------------------------------------
    # /api/<anything> → backend:/<anything>
    # Trailing slash on proxy_pass strips the /api/ prefix.
    location /api/ {
        proxy_pass         http://backend_api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # /media/* are served by the backend's StaticFiles mount
    location /media/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_cache_valid  200 1h;
        expires            7d;
        add_header         Cache-Control "public, max-age=604800, immutable";
    }

    # OpenAPI docs (handy in early prod, remove in tight prod)
    location = /docs        { proxy_pass http://backend_api/docs; proxy_set_header Host $host; }
    location = /openapi.json { proxy_pass http://backend_api/openapi.json; proxy_set_header Host $host; }

    # ------------------------------------------------------------
    # Static assets — cache long-term (Vite hashes filenames)
    # ------------------------------------------------------------
    location ~* \.(?:js|mjs|css|woff2?|ttf|otf|eot|png|jpe?g|gif|svg|webp|ico|map)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Asset directory shortcut (Vite: /assets/...)
    location /assets/ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # ------------------------------------------------------------
    # SPA fallback — every other path returns index.html so
    # TanStack Router can resolve the route client-side.
    # ------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Hide nginx version in headers
    server_tokens off;
}
