# ----------------------------------------------------------------
# Beauté & Élégance — edge proxy
#
# Single public surface. Routes:
#   /api/*    → backend  (FastAPI)
#   /media/*  → backend  (uploaded images, static)
#   /*        → web      (TanStack Start Node SSR)
# ----------------------------------------------------------------

upstream backend_api {
    server backend:8000;
    keepalive 16;
}

upstream frontend_app {
    server web:3000;
    keepalive 16;
}

# WebSocket upgrade pass-through
map $http_upgrade $http_connection {
    default upgrade;
    ''      close;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 12M;       # admin image uploads
    server_tokens off;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/json application/javascript
        application/xml+rss text/javascript image/svg+xml;

    # ------------------------------------------------------------
    # API
    # ------------------------------------------------------------
    location /api/ {
        proxy_pass         http://backend_api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # Backend's StaticFiles mount for uploaded images
    location /media/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_cache_valid  200 1h;
        expires            7d;
        add_header         Cache-Control "public, max-age=604800, immutable";
    }

    # OpenAPI docs (handy until you tighten production)
    location = /docs        { proxy_pass http://backend_api/docs;        proxy_set_header Host $host; }
    location = /openapi.json { proxy_pass http://backend_api/openapi.json; proxy_set_header Host $host; }

    # ------------------------------------------------------------
    # Frontend SSR — everything else
    # ------------------------------------------------------------
    location / {
        proxy_pass         http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $http_connection;
        proxy_read_timeout 60s;

        # Tells the SSR server which host to render canonical URLs for
        proxy_set_header   X-Forwarded-Host  $host;
    }
}
